server:
    port: 20000



spring:
    application:
        name: one-waiguagg
    cloud:
        nacos:
            discovery:
                server-addr: '@discovery.server-addr@'
            config:
                file-extension: yml
                server-addr: '@discovery.server-addr@'
                namespace: '@config.namespace@'
                group: '@config.group@'
                ext-config:
                  -  data-id: mysql_waigua.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: redis.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: mybatis-plus.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: other.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: rabbitmq.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: plumelog.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: waiguagg.yml
                     group: '@config.group@'
                     refresh: true
    profiles:
        active: '@profile.name@'

# springdoc-openapi配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ttt.one.waiguagg

# knife4j增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
feign:
  sentinel:
    enabled: true


seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: default_tx_group  # 这个名称要与file.conf中的配置对应
  enable-auto-data-source-proxy: true
  service:
    vgroup-mapping:
      default_tx_group: default  # 与file.conf中保持一致

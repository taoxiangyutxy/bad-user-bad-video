server:
    port: 40000

spring:
    application:
        name: one-search
    cloud:
        nacos:
            discovery:
                server-addr: '@discovery.server-addr@'
            config:
                file-extension: yaml
                server-addr: '@discovery.server-addr@'
                namespace: '@config.namespace@'
                group: '@config.group@'
                ext-config:
                  -  data-id: mysql_waigua.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: redis.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: mybatis-plus.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: other.yml
                     group: '@config.group@'
                     refresh: true

                  -  data-id: plumelog.yml
                     group: '@config.group@'
                     refresh: true
    profiles:
        active: '@profile.name@'

# springdoc-openapi配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ttt.one.search.controller  # 指定接口文档展示接口包路径扫描

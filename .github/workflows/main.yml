name: 双向自动同步 Gitee ↔ GitHub

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ master ]  # GitHub提交触发
  schedule:
    - cron: '0 18 * * *'  # 每天凌晨2点定时同步

jobs:
  bidirectional-sync:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：配置Git（解决中文/权限问题）
      - name: 基础配置
        run: |
          git config --global user.name "taoxiangyutxy"
          git config --global user.email "496427196@qq.com"
          git config --global core.quotepath false

      # 步骤2：克隆Gitee仓库到本地（核心！不用checkout，直接git clone）
      - name: 克隆Gitee仓库
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 拼接Gitee免密克隆地址
          GITEE_CLONE_URL="https://yyyyxt:${GITEE_TOKEN}@gitee.com/yyyyxt/ttt-one.git"
          git clone $GITEE_CLONE_URL gitee-repo
          cd gitee-repo

      # 步骤3：添加GitHub远程地址，推送到GitHub（Gitee → GitHub）
      - name: 同步Gitee到GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd gitee-repo
          # 添加GitHub远程地址
          GH_PUSH_URL="https://taoxiangyutxy:${GH_TOKEN}@github.com/taoxiangyutxy/bad-user-bad-video.git"
          git remote add github $GH_PUSH_URL
          # 强制推送（确保同步最新）
          git push github master --force

      # 步骤4：克隆GitHub仓库，推送到Gitee（GitHub → Gitee）
      - name: 同步GitHub到Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 克隆GitHub仓库
          GH_CLONE_URL="https://taoxiangyutxy:${GH_TOKEN}@github.com/taoxiangyutxy/bad-user-bad-video.git"
          git clone $GH_CLONE_URL github-repo
          cd github-repo
          # 添加Gitee远程地址
          GITEE_PUSH_URL="https://yyyyxt:${GITEE_TOKEN}@gitee.com/yyyyxt/ttt-one.git"
          git remote add gitee $GITEE_PUSH_URL
          # 强制推送
          git push gitee master --force
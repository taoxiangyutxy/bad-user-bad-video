server:
  port: 22221



spring:
  application:
    name: one-order
  cloud:
    nacos:
      discovery:
        server-addr: '@discovery.server-addr@'
      config:
        file-extension: yaml
        server-addr: '@discovery.server-addr@'
        namespace: '@config.namespace@'
        group: '@config.group@'
        ext-config:
          -  data-id: mysql_waigua.yml
             group: '@config.group@'
             refresh: true

          -  data-id: redis.yml
             group: '@config.group@'
             refresh: true

          -  data-id: mybatis-plus.yml
             group: '@config.group@'
             refresh: true

          -  data-id: other.yml
             group: '@config.group@'
             refresh: true

          -  data-id: plumelog.yml
             group: '@config.group@'
             refresh: true
  profiles:
    active: '@profile.name@'
  thymeleaf:
    cache: false
